name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.0.3). Must match package.json version.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NOTE: The 'production-npm' Environment must be configured in repo
    # Settings -> Environments with at least one required reviewer. This
    # turns workflow_dispatch from an unguarded foot-gun into a deliberate
    # recovery tool: every publish requires explicit human approval.
    environment:
      name: production-npm
      url: https://www.npmjs.com/package/@mcptoolshop/brand
    permissions:
      contents: read
      id-token: write
    steps:
      # Pin checkout to the release tag (or the workflow_dispatch input tag)
      # so the npm tarball is built from the exact commit the git tag points
      # at, not whatever has since landed on main. Closes the largest
      # remaining publish-pipeline gap.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Assert package.json version matches release tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "::error::No release tag available — workflow_dispatch requires an 'tag' input"
            exit 1
          fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION but release tag=$TAG (expected v$PKG_VERSION)"
            echo "::error::Refusing to publish — fix package.json or re-cut the release with the correct tag."
            exit 1
          fi
          echo "Tag/version match: $TAG = $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - run: npm run build --if-present

      - run: npm test --if-present

      - name: Publish to npm
        id: publish
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is required for npm publish but is not configured."
            echo "::error::Set NPM_TOKEN in repo Settings -> Secrets -> Actions before publishing."
            echo "::error::After adding the secret, re-run via: gh workflow run publish.yml -f tag=<release-tag>"
            exit 1
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write publish summary
        if: always()
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PKG_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "unknown")
          {
            echo "## npm publish summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Release tag | \`${TAG:-(none)}\` |"
            echo "| package.json version | \`${PKG_VERSION}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            if [ "${{ steps.publish.outcome }}" = "success" ]; then
              echo "| Status | Published |"
              echo "| Registry | https://www.npmjs.com/package/@mcptoolshop/brand/v/${PKG_VERSION} |"
            else
              echo "| Status | Failed (see logs) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
