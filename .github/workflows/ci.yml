name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'logos/**'
      - 'manifest.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'logos/**'
      - 'manifest.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: npm audit (high)
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: false
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Write CI summary
        if: always()
        run: |
          {
            echo "## CI summary (node ${{ matrix.node-version }})"
            echo ""
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| npm audit (high) | ${{ steps.audit.outcome }} |"
            echo "| typecheck / build / test | ${{ job.status }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify manifest integrity
        id: verify
        run: node dist/cli.js manifest --check --logos logos --output manifest.json
      - name: Write integrity summary
        if: always()
        run: |
          {
            echo "## Manifest integrity"
            echo ""
            if [ "${{ steps.verify.outcome }}" = "success" ]; then
              echo "Manifest hashes match every file in \`logos/\`."
            else
              echo "Manifest verification FAILED — \`logos/\` and \`manifest.json\` are out of sync."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
