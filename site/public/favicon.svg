<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — same motif as src/assets/logo.svg but with a tighter viewBox
  and slightly heavier stroke so the chain silhouette still reads at 16px.
  Single-color emerald-400 (#34d399) — matches site accent and inverts
  cleanly on light/dark browser chrome.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
  <rect x="8" y="8" width="28" height="22" rx="11" />
  <rect x="28" y="34" width="28" height="22" rx="11" />
  <circle cx="32" cy="32" r="3" fill="#34d399" stroke="none" />
</svg>
